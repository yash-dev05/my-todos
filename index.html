<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Todo App</title>
    <style>
        :root {
            --bg-1: #fffbf2;
            --bg-2: #ffe3b3;
            --bg-3: #bfe9ff;
            --card: #fffefbd9;
            --text: #1f2937;
            --muted: #5b6472;
            --accent: #ff7a18;
            --accent-2: #00a6a6;
            --accent-soft: #fff0db;
            --line: #d8e3ea;
        }

        .dark {
            --bg-1: #0f172a;
            --bg-2: #111827;
            --bg-3: #020617;
            --card: #111827cc;
            --text: #f9fafb;
            --muted: #9ca3af;
            --accent: #ff7a18;
            --accent-2: #22d3ee;
            --accent-soft: #1e293b;
            --line: #1f2937;
        }

        .dark .todo-app {
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dark .filter-btn.active {
            color: #fbbf24;
            border-color: #374151;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Manrope", "Segoe UI Variable", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(740px 420px at 5% 0%, rgba(255, 244, 223, 0.4), transparent 68%),
                radial-gradient(660px 420px at 98% 100%, rgba(223, 245, 255, 0.3), transparent 70%),
                linear-gradient(140deg, var(--bg-1), var(--bg-2) 50%, var(--bg-3));
            display: grid;
            place-items: center;
            padding: 24px;
            transition: background 0.4s, color 0.3s;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .todo-app {
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid #ffffffd9;
            border-radius: 22px;
            padding: 26px;
            box-shadow: 0 20px 50px rgba(31, 41, 55, 0.14);
        }

        h1 {
            margin: 0;
            font-size: 1.90rem;
            letter-spacing: -0.03em;
        }

        .subtitle {
            margin: 8px 0 22px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .todo-input-container {
            display: grid;
            gap: 14px;
        }

        .todo-input-container>input,
        .todo-input-container>button {
            width: 100%;
        }

        .todo-input {
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: 12px;
            outline: none;
            font-size: 0.95rem;
            transition: border-color .2s, box-shadow .2s, background-color .2s;
            /* background: #ffffffd9; */
            background: var(--card);
        }

        .todo-input:focus {
            border-color: var(--accent-2);
            box-shadow: 0 0 0 3px #00a6a626;
            background: var(--card);
        }

        .add-button {
            border: none;
            background: linear-gradient(120deg, var(--accent), #ff9f1c);
            color: #fff;
            padding: 12px 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform .15s, opacity .15s, box-shadow .2s;
            box-shadow: 0 8px 20px rgba(255, 122, 24, 0.3);
        }

        .add-button:hover {
            opacity: 0.95;
            box-shadow: 0 10px 24px rgba(255, 122, 24, 0.36);
        }

        .add-button:active {
            transform: translateY(1px);
        }

        .filter-container {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-btn {
            border: 1px solid var(--line);
            background: var(--card);

            color: var(--text);
            padding: 8px 12px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.86rem;
            transition: transform .15s, background-color .2s, border-color .2s;
        }

        .filter-btn:hover {
            transform: translateY(-1px);
        }

        .filter-btn.active {
            background: var(--accent-soft);
            border-color: #ffd29d;
            color: #9e5c16;
        }

        .todo-list {
            list-style: none;
            margin: 2px 0 0;
            padding: 0;
            display: grid;
            gap: 10px;
        }

        .todo-item {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 10px;
            align-items: center;
            padding: 11px 12px;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 12px;
            transition: transform .15s, box-shadow .2s;
        }

        .todo-item:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(40, 58, 78, 0.08);
        }

        .todo-checkbox {
            width: 16px;
            height: 16px;
            accent-color: var(--accent-2);
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: var(--muted);
        }

        .delete-btn {
            border: none;
            background: transparent;
            color: #e45b3f;
            font-size: 1rem;
            cursor: pointer;
            line-height: 1;
            padding: 4px;
            transition: transform .15s, color .15s;
        }

        .delete-btn:hover {
            color: #c64025;
            transform: scale(1.1);
        }

        .todo-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-top: 4px;
        }

        .items-left {
            color: var(--muted);
            font-size: 0.9rem;
            cursor: pointer;
        }

        .items-left:hover {
            color: var(--text);
        }

        .clear-completed {
            border: 1px solid var(--line);
            background: #eefbfd;
            padding: 8px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.86rem;
            color: #1f6f76;
            transition: background-color .2s, transform .15s;
        }

        .clear-completed:hover {
            background: #dff5f9;
            transform: translateY(-1px);
        }

        .clear-completed:active {
            transform: translateY(1px);
            background: #c8e6db;
        }




        /* CUSTOM CHECKBOX (THEMED) */

        .checkbox-wrapper-46 input[type="checkbox"] {
            display: none;
            visibility: hidden;
        }

        .checkbox-wrapper-46 .cbx {
            cursor: pointer;
        }

        .checkbox-wrapper-46 .cbx span {
            display: inline-block;
            vertical-align: middle;
        }

        .checkbox-wrapper-46 .cbx span:first-child {
            position: relative;
            width: 18px;
            height: 18px;
            border-radius: 6px;
            border: 1px solid var(--line);
            transition: all 0.2s ease;
            background: transparent;
        }

        /* CHECK ICON */
        .checkbox-wrapper-46 .cbx span:first-child svg {
            position: absolute;
            top: 3px;
            left: 2px;
            fill: none;
            stroke: white;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 16px;
            stroke-dashoffset: 16px;
            transition: all 0.3s ease;
        }

        /* HOVER */
        .checkbox-wrapper-46 .cbx:hover span:first-child {
            border-color: var(--accent-2);
        }

        /* CHECKED STATE */
        .checkbox-wrapper-46 .inp-cbx:checked+.cbx span:first-child {
            background: var(--accent-2);
            border-color: var(--accent-2);
            animation: wave-46 0.4s ease;
        }

        /* TICK ANIMATION */
        .checkbox-wrapper-46 .inp-cbx:checked+.cbx span:first-child svg {
            stroke-dashoffset: 0;
        }

        /* RIPPLE EFFECT */
        .checkbox-wrapper-46 .cbx span:first-child:before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--accent-2);
            border-radius: 50%;
            transform: scale(0);
        }

        .checkbox-wrapper-46 .inp-cbx:checked+.cbx span:first-child:before {
            transform: scale(3.5);
            opacity: 0;
            transition: all 0.6s ease;
        }

        /* ANIMATION */
        @keyframes wave-46 {
            50% {
                transform: scale(0.9);
            }
        }


        /* Responsive design */
        @media (max-width: 600px) {
            .todo-header h1 {
                font-size: 2rem;
            }

            .todo-input-container {
                flex-direction: column;
            }

            .add-btn {
                width: 100%;
                justify-content: center;
            }

            .filter-container {
                flex-wrap: wrap;
            }

            .todo-item {
                padding: 15px 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="todo-app">
            <header style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <h1>My Todo App</h1>
                    <p class="subtitle">Stay organized and get things done!</p>
                </div>
                <button id="themeToggle" style="
        border:none;
        background: var(--accent-soft);
        padding:8px 12px;
        border-radius:10px;
        cursor:pointer;
        font-size:0.9rem;
    ">
                    🌙
                </button>
            </header>
            <div class="todo-input-container">
                <input type="text" id="todoInput" class="todo-input" autocomplete="off" placeholder="Add a new task...">
                <button id="addTodoButton" class="add-button">Add</button>

                <div class="filter-container">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>

                <ul class="todo-list" id="todoList">
                    <li class="todo-item">
                        <div class="checkbox-wrapper-46">
                            <input type="checkbox" class="inp-cbx todo-checkbox" id="cbx-1" />
                            <label for="cbx-1" class="cbx">
                                <span>
                                    <svg viewBox="0 0 12 10" height="10px" width="12px">
                                        <polyline points="1.5 6 4.5 9 10.5 1"></polyline>
                                    </svg>
                                </span>
                            </label>
                        </div>
                        <span class="todo-text">Review pull requests</span>
                        <button class="delete-btn">&times;</button>
                    </li>

                    <li class="todo-item completed">
                        <div class="checkbox-wrapper-46">
                            <input type="checkbox" class="inp-cbx todo-checkbox" id="cbx-1" />
                            <label for="cbx-" class="cbx">
                                <span>
                                    <svg viewBox="0 0 12 10" height="10px" width="12px">
                                        <polyline points="1.5 6 4.5 9 10.5 1"></polyline>
                                    </svg>
                                </span>
                            </label>
                        </div>
                        <span class="todo-text">Review pull requests</span>
                        <button class="delete-btn">&times;</button>
                    </li>
                    <li class="todo-item">
                        <div class="checkbox-wrapper-46">
                            <input type="checkbox" class="inp-cbx todo-checkbox" id="cbx-2" />
                            <label for="cbx-2" class="cbx">
                                <span>
                                    <svg viewBox="0 0 12 10" height="10px" width="12px">
                                        <polyline points="1.5 6 4.5 9 10.5 1"></polyline>
                                    </svg>
                                </span>
                            </label>
                        </div>
                        <span class="todo-text">Update team on progress</span>
                        <button class="delete-btn">&times;</button>
                    </li>

                </ul>
                <div class="todo-footer">
                    <span id="itemsLeft" class="items-left">2 items left</span>
                    <button id="clearCompletedBtn" class="clear-completed">Clear Completed</button>
                </div>

            </div>
        </div>
    </div>
</body>

<script src="app.js">

</script>

</html>
